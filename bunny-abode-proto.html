<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bunny Abode</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#1a1a2e;
    display:flex; justify-content:center; align-items:flex-start;
    min-height:100vh; font-family:'Arial Rounded MT Bold',Arial,sans-serif;
    padding:20px;
  }
  .phone {
    width:390px; background:#1e8aaa;
    border-radius:40px; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.7);
    position:relative;
  }
  .status-bar {
    background:#7b3fa0; padding:10px 20px 8px;
    display:flex; justify-content:space-between; align-items:center;
    font-size:13px; color:white; font-weight:600;
  }
  .header {
    background:linear-gradient(180deg,#7b3fa0 0%,#5a2d7a 100%);
    padding:10px 16px 14px; display:flex; align-items:center; justify-content:space-between;
  }
  .header-left { display:flex; align-items:center; gap:8px; }
  .back-btn { color:white; font-size:24px; cursor:pointer; }
  .token-badge {
    display:flex; align-items:center; gap:6px;
    background:rgba(0,0,0,0.25); border-radius:20px; padding:4px 12px 4px 6px;
  }
  .token-ball-icon { width:26px; height:26px; }
  .token-count { color:#ffd700; font-size:15px; font-weight:900; }
  .scene {
    background:linear-gradient(180deg,#2b9ebf 0%,#1e8aaa 100%);
    padding:12px 0 8px;
  }
  .title-bar { text-align:center; margin-bottom:10px; }
  .title-pill {
    display:inline-block; background:rgba(0,0,0,0.45);
    color:white; font-size:18px; font-weight:700;
    padding:5px 24px; border-radius:20px;
  }
  .image-frame {
    margin:0 16px; border-radius:10px;
    border:3px solid #4ab8e0; overflow:hidden; background:white;
    position:relative;
  }
  #display-canvas { width:100%; display:block; }
  #loading-msg {
    position:absolute; inset:0; display:flex;
    align-items:center; justify-content:center;
    background:white; color:#999; font-size:14px;
  }
  .num-buttons-wrap {
    background:linear-gradient(180deg,#1e8aaa 0%,#1a7a99 100%);
    padding:10px 4px 6px;
  }
  .num-scroll { display:flex; align-items:center; gap:2px; }
  .scroll-arrow {
    width:30px; height:30px; background:rgba(255,255,255,0.15); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:white; font-size:16px; cursor:pointer; font-weight:700;
    user-select:none; flex-shrink:0;
  }
  .num-buttons { display:flex; gap:6px; flex:1; justify-content:center; }
  .num-btn {
    width:52px; height:52px; border-radius:10px;
    background:#b8d4e8; border:none; cursor:pointer;
    font-size:22px; font-weight:900; color:#6a8faa;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.12s; box-shadow:0 3px 0 #7a9ab5;
  }
  .num-btn.num-used {
    background:#7a9ab5; color:#4a6a85; cursor:not-allowed;
    box-shadow:0 2px 0 #5a7a95; opacity:0.5;
  }
  .num-btn.active {
    background:linear-gradient(180deg,#ffd700 0%,#f5a623 100%);
    color:white; box-shadow:0 3px 0 #c47a00;
  }
  .color-row {
    background:#1a7a99; padding:8px 12px 12px;
    display:flex; gap:8px; justify-content:center;
  }
  .color-swatch {
    flex:1; min-width:0; height:68px; border-radius:14px;
    border:none; cursor:pointer;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px;
    transition:transform 0.1s;
  }
  .color-swatch.selected {
    outline:3px solid white; outline-offset:2px; transform:scale(1.06);
  }
  .color-swatch.used {
    opacity:0.35; cursor:not-allowed; filter:grayscale(60%);
    transform:none !important; outline:none !important;
  }
  .swatch-value {
    color:white; font-size:17px; font-weight:900;
    text-shadow:0 1px 3px rgba(0,0,0,0.4); line-height:1;
  }
  .swatch-ball { width:18px; height:18px; margin-top:1px; }
  .ground-strip { height:12px; background:linear-gradient(180deg,#8B6914,#6B4F10); }
  .rewards-inset {
    margin: 0 16px 8px;
    background: linear-gradient(180deg, #5a3a1a 0%, #3d2510 100%);
    border-radius: 14px;
    border: 2px solid #8a6040;
    padding: 5px 12px 7px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.35);
  }
  .rewards-inset-title {
    text-align: center; color: white; font-size: 11px; font-weight: 900;
    letter-spacing: 0.8px; margin-bottom: 4px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .rewards-inset-row {
    display: flex; justify-content: center; align-items: center; gap: 18px;
  }
  .reward-item {
    display: flex; flex-direction: row;
    align-items: center; gap: 5px;
  }
  .reward-img {
    width: 36px; height: 36px; object-fit: contain;
  }
  .reward-label {
    color: #ffd700; font-size: 14px; font-weight: 900;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }

  /* Completed overlay */
  .completed-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    align-items: center; justify-content: center;
  }
  .completed-overlay.visible { display: flex; }
  @keyframes popIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
  .completed-card {
    width: 390px;
    background: linear-gradient(180deg, #2b1a5a 0%, #1a0f3a 100%);
    border-radius: 32px;
    padding: 36px 24px 28px;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    border: 2px solid #7b5fc0;
    box-shadow: 0 16px 48px rgba(0,0,0,0.7);
    animation: popIn 0.3s ease;
  }
  .completed-stars { font-size: 32px; letter-spacing: 4px; }
  .completed-title {
    color: #ffd700; font-size: 26px; font-weight: 900;
    text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 2px 4px rgba(0,0,0,0.5);
    letter-spacing: 1px; text-align: center;
  }
  .completed-subtitle {
    color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 700;
    letter-spacing: 0.5px;
  }
  .completed-rewards {
    width: 100%; background: rgba(0,0,0,0.3);
    border-radius: 16px; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 12px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .cr-item {
    display: flex; align-items: center; gap: 14px;
  }
  .cr-img { width: 48px; height: 48px; object-fit: contain; }
  .cr-label { color: #ffd700; font-size: 15px; font-weight: 900;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
  .completed-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(180deg, #ffd700 0%, #f5a623 100%);
    border: none; border-radius: 14px;
    color: #3a1f00; font-size: 18px; font-weight: 900;
    cursor: pointer; box-shadow: 0 4px 0 #c47a00;
    letter-spacing: 0.5px; transition: transform 0.1s, box-shadow 0.1s;
  }
  .completed-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #c47a00; }

  /* ALL DRAWS button */
  .all-draws-btn {
    position: relative;
    background: linear-gradient(180deg, #ffcc00 0%, #ff8c00 100%);
    border: 3px solid #c45f00;
    border-radius: 18px;
    padding: 7px 14px;
    cursor: pointer;
    box-shadow: 0 4px 0 #a04000, inset 0 1px 0 rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .all-draws-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #a04000; }
  .all-draws-btn span {
    color: white; font-size: 14px; font-weight: 900;
    text-shadow: -1px -1px 0 #b85000, 1px -1px 0 #b85000, -1px 1px 0 #b85000, 1px 1px 0 #b85000;
    letter-spacing: 0.3px; line-height: 1.2; text-align: center;
  }
  /* Puzzle notches using pseudo-elements */
  .all-draws-btn::before,
  .all-draws-btn::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: linear-gradient(180deg, #ffcc00 0%, #ff8c00 100%);
    border-radius: 50%;
    top: 50%; transform: translateY(-50%);
    border: 3px solid #c45f00;
  }
  .all-draws-btn::before { left: -8px; }
  .all-draws-btn::after  { right: -8px; }
</style>
</head>

const dctx       = display.getContext('2d');
const loadingMsg = document.getElementById('loading-msg');

// ── helpers ──────────────────────────────────────────────────────────────────

function isCheckerboard(r, g, b) {
  const avg     = (r + g + b) / 3;
  const maxDiff = Math.max(Math.abs(r - avg), Math.abs(g - avg), Math.abs(b - avg));
  return avg > 148 && avg < 238 && maxDiff < 30;
}

function loadImage(src) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => res(img);
    img.src = src;
  });
}

function imgToPixels(img) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  c.getContext('2d').drawImage(img, 0, 0);
  return c.getContext('2d').getImageData(0, 0, c.width, c.height).data;
}

// ── init ─────────────────────────────────────────────────────────────────────

async function init() {
  const imgs = await Promise.all(IMG_SRCS.map(loadImage));
  W = imgs[0].naturalWidth;
  H = imgs[0].naturalHeight;

  // Get raw pixels for each image
  imgs.forEach(img => rawPixels.push(imgToPixels(img)));

  // Build per-region masks (with border inset)
  for (let idx = 0; idx < N; idx++) {
    const pix  = rawPixels[idx];
    const mask = new Uint8Array(W * H);
    for (let y = BORDER; y < H - BORDER; y++) {
      for (let x = BORDER; x < W - BORDER; x++) {
        const i = (y * W + x) * 4;
        if (isCheckerboard(pix[i], pix[i+1], pix[i+2])) {
          mask[y * W + x] = 1;
        }
      }
    }
    masks.push(mask);
  }

  // Build base: for each pixel, pick the darkest / most "ink-like" value across
  // all images where that pixel is NOT checkerboard. This reconstructs clean line art.
  basePixels = new Uint8ClampedArray(W * H * 4);
  for (let p = 0; p < W * H; p++) {
    // Check if this pixel is a region pixel in any image
    let anyCheckerboard = false;
    for (let idx = 0; idx < N; idx++) {
      if (masks[idx][p]) { anyCheckerboard = true; break; }
    }

    if (anyCheckerboard) {
      // Paint white for all region pixels in the base
      basePixels[p*4]   = 255;
      basePixels[p*4+1] = 255;
      basePixels[p*4+2] = 255;
      basePixels[p*4+3] = 255;
    } else {
      // Take pixel from image 0 (all non-region pixels are the same across images)
      const i = p * 4;
      basePixels[p*4]   = rawPixels[0][i];
      basePixels[p*4+1] = rawPixels[0][i+1];
      basePixels[p*4+2] = rawPixels[0][i+2];
      basePixels[p*4+3] = 255;
    }
  }

  loadingMsg.style.display = 'none';
  display.width  = W;
  display.height = H;
  recomposite();
}

// ── compositing ───────────────────────────────────────────────────────────────

function recomposite() {
  // Start from base
  const id = new ImageData(new Uint8ClampedArray(basePixels), W, H);
  const d  = id.data;

  // Apply each painted region on top
  for (let idx = 0; idx < N; idx++) {
    const hex = regionColors[idx];
    if (!hex) continue;
    const cr = parseInt(hex.slice(1,3), 16);
    const cg = parseInt(hex.slice(3,5), 16);
    const cb = parseInt(hex.slice(5,7), 16);
    const mask = masks[idx];

    for (let p = 0; p < W * H; p++) {
      if (!mask[p]) continue;
      const i = p * 4;
      // Blend with base lightness to preserve texture
      const t  = (d[i] + d[i+1] + d[i+2]) / (3 * 255);
      d[i]   = Math.round(cr * (0.4 + t * 0.6));
      d[i+1] = Math.round(cg * (0.4 + t * 0.6));
      d[i+2] = Math.round(cb * (0.4 + t * 0.6));
    }
  }

  dctx.putImageData(id, 0, 0);
}

// ── UI actions ────────────────────────────────────────────────────────────────

function selectButton(idx) {
  currentIdx = idx;
  document.querySelectorAll('.num-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  // No redraw needed — the composite already shows everything
}

let tokenCount = 1500;

function updateTokenDisplay() {
  document.getElementById('token-count').textContent = tokenCount.toLocaleString();
}

function selectColor(hex, btn, region, cost) {
  if (btn.classList.contains('used')) return;
  if (!basePixels) return;
  regionColors[region] = hex;
  recomposite();
  btn.classList.add('used');
  // Deduct currency
  tokenCount = Math.max(0, tokenCount - cost);
  updateTokenDisplay();
  // Check if all regions painted
  if (regionColors.every(c => c !== null)) {
    setTimeout(showCompleted, 400);
  }
}

function showCompleted() {
  document.getElementById('completed-overlay').classList.add('visible');
}

  btn.className = 'num-btn' + (i === 0 ? ' active' : '');
  btn.textContent = i + 1;
  btn.onclick = () => selectButton(i);
  numContainer.appendChild(btn);
}
